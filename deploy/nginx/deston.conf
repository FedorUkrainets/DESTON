# =============================================================================
# DESTON — nginx reverse proxy config
# Place at: /etc/nginx/sites-available/deston.conf
# Symlink:  ln -s /etc/nginx/sites-available/deston.conf /etc/nginx/sites-enabled/
# Reload:   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# Rate limit zone for API endpoints (10r/s per IP, burst 20).
limit_req_zone $binary_remote_addr zone=deston_api:10m rate=10r/s;

# Map for HTTP→HTTPS redirect.
server {
    listen      80;
    listen      [::]:80;
    server_name your-domain.ru www.your-domain.ru;

    # ACME challenge for Let's Encrypt.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name your-domain.ru www.your-domain.ru;

    # ---- SSL (managed by certbot) ----
    ssl_certificate     /etc/letsencrypt/live/your-domain.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling.
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ---- Security headers (Next.js also sets CSP/X-Frame; we add HSTS here) ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- Tuning ----
    server_tokens off;
    client_max_body_size 10M;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    keepalive_timeout 65;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
      text/plain text/css text/javascript application/javascript
      application/json application/xml application/rss+xml
      image/svg+xml font/ttf font/otf application/font-woff application/font-woff2;

    # ---- Logs ----
    access_log /var/log/nginx/deston.access.log;
    error_log  /var/log/nginx/deston.error.log warn;

    # ---- Webhook (no rate limit — payments must always go through) ----
    location = /api/payment/webhook {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    # ---- API routes — rate-limited ----
    location /api/ {
        limit_req zone=deston_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Next.js static assets — long-cache ----
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ---- Everything else → Next.js ----
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
