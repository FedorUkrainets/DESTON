# =============================================================================
# DESTON — TEST nginx config (HTTP only, no domain).
# Use this for short-lived deploys to a Selectel VPS by IP, without SSL.
# When you have a domain, switch to deston.conf instead.
#
# Place at: /etc/nginx/sites-available/deston-test.conf
# Symlink:  sudo ln -sf /etc/nginx/sites-available/deston-test.conf /etc/nginx/sites-enabled/
# Reload:   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

limit_req_zone $binary_remote_addr zone=deston_api_test:10m rate=10r/s;

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;   # accepts any host / IP

    server_tokens off;
    client_max_body_size 10M;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
      text/plain text/css text/javascript application/javascript
      application/json application/xml application/rss+xml
      image/svg+xml font/ttf font/otf application/font-woff application/font-woff2;

    access_log /var/log/nginx/deston.access.log;
    error_log  /var/log/nginx/deston.error.log warn;

    # API rate limiting (webhook will not arrive anyway in test mode).
    location /api/ {
        limit_req zone=deston_api_test burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
